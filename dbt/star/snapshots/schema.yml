version: 2

snapshots:
  - name: dim_companies
    description: "slowly changing dimension (scd type 2) tracking company metadata history."
    tests:
      - dbt_utils.expression_is_true:
          expression: "coalesce(dbt_valid_to, timestamp('9999-12-31')) >= dbt_valid_from"
    columns:
      - name: dbt_scd_id
        description: "primary key: unique hash for this specific version of the company profile."
        tests:
          - unique
          - not_null
      - name: company_symbol
        description: "the stock ticker symbol (e.g., aapl)."
        tests:
          - not_null
      - name: company_name
        description: "the full legal name of the corporation."
      - name: company_description
        description: "the official company business summary."
      - name: dbt_valid_from
        description: "the start date of this record's validity period."
      - name: dbt_valid_to
        description: "the end date of this record's validity period (null for current records)."

  - name: dim_employees
    description: "slowly changing dimension tracking employee counts."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: company_symbol
        tests:
          - not_null
      - name: company_full_time_employees
        description: "cleaned integer count of employees at the time of this load."

  - name: dim_industries
    description: "slowly changing dimension tracking industry classifications."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: company_symbol
        tests:
          - not_null
      - name: company_industry
        description: "the specific industry classification."

  - name: dim_sectors
    description: "slowly changing dimension tracking sector classifications."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: company_symbol
        tests:
          - not_null
      - name: company_sector
        description: "the broad economic sector."
