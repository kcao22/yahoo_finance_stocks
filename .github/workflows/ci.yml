name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Linting dependencies
        run: |
          pip install ruff
      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  python-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build image
        id: image-handling
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/yahoo_finance_stocks:latest"
          if docker pull $IMAGE_TAG; then
            echo "Image successfully pulled from registry."
          else
            echo "Image not found in registry. Building it now..."
            docker build -t $IMAGE_TAG -f docker/airflow.dockerfile docker/
          fi

      - name: Run tests in Docker
        run: |
          docker run --rm \
            -u 50000 \
            -v ${{ github.workspace }}/dags:/opt/airflow/dags \
            -v ${{ github.workspace }}/tests:/opt/airflow/tests \
            -v ${{ github.workspace }}/docker:/opt/airflow/docker \
            -e PYTHONPATH=/opt/airflow/dags \
            ghcr.io/${{ github.repository_owner }}/yahoo_finance_stocks:latest \
            bash -c "pip install --user --no-cache-dir -r /opt/airflow/docker/requirements.txt pytest pytest-mock pytest-asyncio && python -m pytest /opt/airflow/tests/"


  terraform-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
      - name: Terraform Format
        run: terraform fmt -check
        working-directory: terraform
      - name: Terraform Init
        run: terraform init
        working-directory: terraform
      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform
